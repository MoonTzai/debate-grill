<style>
:root{--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--gold:#4f6bed;--text:#222;--gray:#666}

.entry-logo{font-family:"Cascadia Code","Fira Code","JetBrains Mono","Consolas","Courier New",monospace;font-size:12px;line-height:1.15;color:var(--gold);text-align:left;margin:0 auto 32px;display:table;white-space:pre;transform:translateX(-19px)}
.logo-leaf{color:#6ecd71}

.entry-btn:hover{border-color:var(--gold);color:var(--gold)}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}60%{transform:translateY(-3px)}}
.bouncing{animation:bounce 0.5s ease}img{max-width:420px;height:auto}@media(min-width:601px)and(max-width:900px){img{max-width:340px;height:auto}.entry-btn{width:160px;padding:13px 24px;font-size:17px}}@media(max-width:600px){body{padding:16px}img{max-width:260px;height:auto}.entry-btn{width:140px;padding:12px 20px;font-size:16px;margin:4px}}</style>
