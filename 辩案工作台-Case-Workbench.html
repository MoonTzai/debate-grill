<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>备赛整合 · 标准化辩案工作台</title>
<style>
:root {
  --bg: #0d0d0d; --card: #141414; --border: #222; --input-bg: #1a1a1a;
  --gold: #ffc000; --text: #eee; --gray: #999; --dark-gray: #555;
  --blue: #4fa8ee; --green: #6ecd71; --red: #ee5555;
  --radius: 8px; --radius-sm: 6px;
}
body.light {
  --bg: #f5f5f5; --card: #fff; --border: #e0e0e0; --input-bg: #f0f0f0;
  --gold: #4f6bed; --text: #222; --gray: #666; --dark-gray: #999;
  --blue: #4f6bed; --green: #4caf50; --red: #e53935;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Microsoft YaHei','PingFang SC',sans-serif; height: 100vh; display: flex; flex-direction: column; }
header { background: var(--card); padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 16px; color: var(--gold); }
header .step-label { font-size: 12px; color: var(--gray); }
main { flex: 1; overflow-y: auto; padding: 20px; max-width: 920px; margin: 0 auto; width: 100%; }

.step-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.step-card h2 { color: var(--gold); font-size: 18px; margin-bottom: 8px; }
.step-card h3 { color: var(--gold); font-size: 15px; margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.step-card h4 { color: var(--text); font-size: 13px; margin: 12px 0 4px; }
.meta { color: var(--gray); font-size: 12px; margin-bottom: 10px; }
.coach-msg { background: var(--input-bg); border-left: 3px solid var(--gold); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 16px; margin: 12px 0; font-size: 15px; line-height: 1.7; }
.coach-msg .tag { color: var(--gold); font-weight: bold; }
.part-label { display: inline-block; background: var(--border); color: var(--gold); padding: 2px 10px; border-radius: 12px; font-size: 11px; margin-right: 8px; vertical-align: middle; }

table.t { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
table.t th { background: var(--input-bg); color: var(--gold); padding: 8px 10px; border: 1px solid var(--border); text-align: left; font-weight: normal; font-size: 12px; }
table.t td { padding: 6px; border: 1px solid var(--border); vertical-align: top; }
table.t td input, table.t td textarea, table.t td select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none; }
table.t td input:focus, table.t td textarea:focus, table.t td select:focus { border-color: var(--gold); }
table.t td textarea { min-height: 48px; resize: vertical; }
table.t td select { padding: 6px 8px; }

.progress-bar { display: flex; gap: 3px; margin-bottom: 20px; }
.progress-dot { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
.progress-dot.done { background: var(--green); }
.progress-dot.current { background: var(--gold); }

.row-inp { display: flex; gap: 10px; align-items: flex-start; margin: 8px 0; }
.row-inp label { color: var(--gray); font-size: 12px; min-width: 70px; padding-top: 9px; flex-shrink: 0; }
.row-inp input, .row-inp textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none; }
.row-inp input:focus, .row-inp textarea:focus { border-color: var(--gold); }
.row-inp textarea { min-height: 48px; resize: vertical; }

.btn-sm { background: var(--card); border: 1px solid var(--border); color: var(--gray); padding: 4px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-family: inherit; }
.btn-sm:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm.danger { color: var(--red); border-color: transparent; }
.btn-sm.danger:hover { border-color: var(--red); }
.btn-add { background: var(--card); border: 1px solid var(--border); color: var(--gray); padding: 6px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
.btn-add:hover { border-color: var(--gold); color: var(--gold); }
.btn-add.gold { border-color: var(--gold); color: var(--gold); }
.btn-add.gold:hover { background: var(--gold); color: #000; }
body.light .btn-add.gold:hover { background: var(--gold); color: #fff; }
.add-row-wrap { text-align: right; padding: 6px 0 2px; }

.btn-r { display: flex; gap: 8px; margin: 12px 0; }
.btn { background: var(--card); color: var(--gray); border: 1px solid var(--border); padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.15s; }
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.gold { background: var(--gold); color: #000; border: none; font-weight: bold; }
.btn.gold:hover { opacity: 0.85; }
body.light .btn.gold { color: #fff; }
.btn.green { background: var(--green); color: #fff; border: none; font-weight: bold; }
.btn.green:hover { opacity: 0.85; }

.output-panel { background: var(--input-bg); border: 1px solid var(--gold); border-radius: var(--radius); padding: 16px; margin: 12px 0; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-family: 'Consolas','Microsoft YaHei',monospace; font-size: 13px; line-height: 1.6; color: var(--text); display: none; }
.fmt-row { display:flex;gap:10px;justify-content:center;margin:8px 0; }
.fmt-btn { flex:1;max-width:150px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:14px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;text-align:center; }
.fmt-btn:hover { border-color:var(--gold); }
.fmt-btn b { display:block;font-size:16px;color:var(--gold);margin-bottom:6px; }
.fmt-btn span { display:block;font-size:11px;color:var(--gray);line-height:1.3; }
.output-panel.show { display: block; }

#theme-toggle { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
#theme-toggle:hover, #clear-data:hover { border-color: var(--gold); color: var(--gold); }
#clear-data { background: transparent; border: 1px solid var(--border); color: var(--gray); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; margin-left: 8px; }
.section-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 0; position: relative; }
.section-block .remove-btn { position: absolute; top: 10px; right: 10px; }


/* Responsive */
@media (max-width:600px) {
  header { padding: 10px 14px; }
  header h1 { font-size: 14px; }
  main { padding: 12px; }
  .step-card { padding: 14px; }
  table.t { font-size: 11px; }
  table.t td input, table.t td textarea { font-size: 11px; padding: 5px 7px; }
  .row-inp { flex-direction: column; gap: 4px; }
  .row-inp label { padding-top: 0; }
}
</style>
</head>
<body class="light">
<header><h1>备赛整合 · 标准化辩案工作台 <span class="step-label" id="step-label"></span></h1><span style="display:flex;gap:8px;align-items:center"><button id="theme-toggle" onclick="document.body.classList.toggle('light');this.textContent='界面颜色'" title="切换深色/浅色主题">界面颜色</button><button id="clear-data" onclick="if(confirm('确定清除所有填写数据？此操作不可恢复。')){localStorage.removeItem('estage_v2');location.reload();}" title="清除本地数据" style="color:var(--red)">清除数据</button></span></header>
<main id="content"></main>
<div style="padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;justify-content:center;background:var(--card);align-items:center;position:relative">
  <button onclick="window.top.location.reload()" class="btn" style="padding:10px 12px;position:absolute;left:20px">主页</button>
  <span style="display:flex;gap:12px;align-items:center">
  <button onclick="prevStep()" id="btn-prev" class="btn">← 上一步</button>
  <span style="color:var(--gray);font-size:13px" id="page-num"></span>
  <button onclick="nextStep()" id="btn-next" class="btn gold">下一步 →</button>
  </span>
</div>

<script>
(function(){if(typeof Capacitor==='undefined'){var s=document.createElement('script');s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';document.head.appendChild(s);}})();
</script>
<script>
const STEPS = [
  { id:'E0', title:'总览' },{ id:'E1', title:'资料搜集', part:'Part1' },
  { id:'E2', title:'资料汇编1.0', part:'Part2' },{ id:'E3', title:'论点穷举', part:'Part3' },
  { id:'E4', title:'论证架构', part:'Part4' },{ id:'E5', title:'我方防守', part:'Part5' },
  { id:'E6', title:'我方攻击', part:'Part6' },{ id:'E7', title:'自由辩套题', part:'Part7' },
  { id:'E8', title:'资料汇编2.0', part:'Part8' },{ id:'E9', title:'导出辩案', part:'Part9' },
];
let current = 0;

// ---- DATA STORE ----
let D = {};
try { const s=localStorage.getItem('estage_v2'); if(s) D=JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('estage_v2', JSON.stringify(D)); } catch(e) {} }
function g(k,dflt) { return D[k]!==undefined ? D[k] : (dflt||''); }
function s(k,v) { D[k]=v; save(); }
function si(k,i,v) { s(k+'_'+i, v); }
function gi(k,i,dflt) { return g(k+'_'+i, dflt); }

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function I(key,ph) { return `<input data-k="${key}" placeholder="${ph||''}" value="${esc(g(key))}" oninput="s('${key}',this.value)">`; }
function T(key,ph) { return `<textarea data-k="${key}" placeholder="${ph||''}" oninput="s('${key}',this.value)">${esc(g(key))}</textarea>`; }
function S(key,opts) { const v=g(key,opts[0]); return `<select data-k="${key}" onchange="s('${key}',this.value)">${opts.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`; }
function II(prefix,i,ph) { return `<input data-k="${prefix}_${i}" placeholder="${ph||''}" value="${esc(gi(prefix,i))}" oninput="si('${prefix}','${i}',this.value)">`; }
function TI(prefix,i,ph) { return `<textarea data-k="${prefix}_${i}" placeholder="${ph||''}" oninput="si('${prefix}','${i}',this.value)">${esc(gi(prefix,i))}</textarea>`; }

// Dynamic list utils
function ensureList(key, defaultCount) {
  if (!D[key+'_count']) s(key+'_count', defaultCount);
}
function getCount(key) { return parseInt(g(key+'_count'))||0; }

function rowCount(key){
  let n=0;
  while(gi(key+'_atk',n)||gi(key+'_res',n)||gi(key+'_arg',n)||gi(key+'_s',n)||gi(key+'_q',n))n++;
  return n||parseInt(g(key+'_count'))||0;
}
function rowCount2(key,field){
  let n=0;
  while(gi(key+'_'+field,n))n++;
  return n||parseInt(g(key+'_count'))||0;
}
function addItem(key) { const c=getCount(key); s(key+'_count', c+1); render(); }
function removeItem(key, idx) {
  const c=getCount(key);
  // Shift items above idx down
  for (let i=idx; i<c-1; i++) {
    for (let f of D._fields||[]) {
      // Nope, just shift by brute force in render
    }
  }
  s(key+'_count', Math.max(0, c-1));
  render();
}

function progressBar() {
  let d='';
  for(let i=0;i<STEPS.length;i++) d+=`<div class="progress-dot ${i<current?'done':i===current?'current':''}"></div>`;
  return `<div class="progress-bar">${d}</div>`;
}

// ---- E0 ----
function rE0() {
  return progressBar()+`
  <div class="step-card"><h2>备赛整合工作台</h2>
  <p style="font-size:15px;line-height:1.7;color:var(--text);margin-bottom:12px">本工具系根据<b style="color:var(--gold)">《辩论筑基》标准化辩案模板</b>、逐表填写、最终导出完整辩案的辅助小工具，也可按顺序辅助引导备赛流程。</p><p style="font-size:15px;line-height:1.7;color:var(--text);margin-bottom:12px">每张表都支持动态增删行——有多少关键词就加多少行，有多少辩位就加多少行。</p>
  <div class="coach-msg"><span class="tag">用法</span> 从左到右挨个填。每步填完点下一步。到 E9 点「导出辩案」生成完整辩案文档。</div>
  <h3>九张工作表</h3>
  <table class="t"><tr><th style="width:40px">#</th><th>工作表</th><th>核心产出</th></tr>
  <tr><td>1</td><td>资料搜集</td><td>关键词解释 + 类似案例 + 热点事件 + 专业理论（行数自定）</td></tr>
  <tr><td>2</td><td>资料汇编1.0</td><td>按论证方向归类去重（方向数自定）</td></tr>
  <tr><td>3</td><td>论点穷举</td><td>"因为…所以…" 不限条数</td></tr>
  <tr><td>4</td><td>论证架构</td><td>定义 → 标准B0 → 分论点(N个) → 环节任务(N行,自由填写)</td></tr>
  <tr><td>5</td><td>我方防守</td><td>每个我方论点 × 多路径 × 四层回应链</td></tr>
  <tr><td>6</td><td>我方攻击</td><td>每个对方论点 × 三种反驳类型</td></tr>
  <tr><td>7</td><td>自由辩套题</td><td>N个战场 × (问→追×2→归→转)</td></tr>
  <tr><td>8</td><td>资料汇编2.0</td><td>按Part4架构重新归类</td></tr>
  <tr><td>9</td><td>导出辩案</td><td>一致性检查 → 编译输出完整辩案文档</td></tr></table>
  <div class="btn-r"><button class="btn gold" onclick="nextStep()">开始 →</button></div></div>`;
}

// ---- E1: Part1 资料搜集 ----
function rE1() {
  ensureList('e1_kw',3); ensureList('e1_case',2); ensureList('e1_news',2); ensureList('e1_theory',2);
  let h=progressBar()+`<div class="step-card"><h2><span class="part-label">Part1</span>资料搜集</h2>`;
  const blocks=[
    {name:'关键词解释',key:'e1_kw',desc:'辩题每个关键词至少3条不同来源的解释', hasKw:true},
    {name:'类似案例/调查',key:'e1_case',desc:'和辩题相关的公共事件、学术调查、历史案例', hasKw:false},
    {name:'热点/近期事件',key:'e1_news',desc:'近1-2年与辩题相关的新闻', hasKw:false},
    {name:'专业理论/学术研究',key:'e1_theory',desc:'学术理论、法律条文、专业数据', hasKw:false},
  ];
  blocks.forEach(b=>{
    const n=getCount(b.key);
    h+=`<h3>${b.name}</h3><p class="meta">${b.desc}</p>`;
    if (b.hasKw) {
      h+=`<table class="t"><tr><th style="width:30px">#</th><th style="width:80px">关键词</th><th>一句话概括</th><th>关键句粘贴</th><th style="width:100px">作者/机构/时间</th><th style="width:80px">来源</th><th style="width:100px">网址</th><th style="width:30px"></th></tr>`;
    } else {
      h+=`<table class="t"><tr><th style="width:30px">#</th><th>一句话概括</th><th>关键句粘贴</th><th style="width:100px">作者/机构/时间</th><th style="width:80px">来源</th><th style="width:100px">网址</th><th style="width:30px"></th></tr>`;
    }
    for(let i=0;i<n;i++){
      if (b.hasKw) {
        h+=`<tr><td>${i+1}</td><td>${II(b.key+'_kw',i)}</td><td>${II(b.key+'_s',i)}</td><td>${TI(b.key+'_q',i)}</td><td>${II(b.key+'_a',i)}</td><td>${II(b.key+'_src',i)}</td><td>${II(b.key+'_url',i)}</td><td>${n>1?`<button class="btn-sm danger" onclick="removeRow('${b.key}',${i})">×</button>`:''}</td></tr>`;
      } else {
        h+=`<tr><td>${i+1}</td><td>${II(b.key+'_s',i)}</td><td>${TI(b.key+'_q',i)}</td><td>${II(b.key+'_a',i)}</td><td>${II(b.key+'_src',i)}</td><td>${II(b.key+'_url',i)}</td><td>${n>1?`<button class="btn-sm danger" onclick="removeRow('${b.key}',${i})">×</button>`:''}</td></tr>`;
      }
    }
    h+=`</table><div class="add-row-wrap"><button class="btn-add" onclick="addItem('${b.key}')">+1行</button></div>`;
  });
  return h+`</div>`;
}
function removeOpp(o){
  var n=parseInt(g('e6_opp_count'))||0;
  if(n<=1) return;
  var last=n-1;
  if(o!==last){
    si('e6_opp_chain',o,gi('e6_opp_chain',last));
    si('e6_opp_ev',o,gi('e6_opp_ev',last));
    for(var ti=0;ti<3;ti++){
      si('e6_atk',o+'_'+ti,gi('e6_atk',last+'_'+ti));
      si('e6_ev',o+'_'+ti,gi('e6_ev',last+'_'+ti));
      si('e6_arg',o+'_'+ti,gi('e6_arg',last+'_'+ti));
    }
  }
  s('e6_opp_count',n-1);
  render();
}
function removeRow(key,idx) {
  const n=getCount(key);
  // Copy last item to idx, then decrement count
  if (n<=1) return;
  const fields=['s','q','a','src','url'];
  for (let i=idx; i<n-1; i++) {
    fields.forEach(f=>{ si(key+'_'+f, i, gi(key+'_'+f, i+1)); });
  }
  s(key+'_count', n-1);
  render();
}

// ---- E2: Part2 资料汇编1.0 ----
function rE2() {
  ensureList('e2_dir',3);
  const nd=getCount('e2_dir');
  let h=progressBar()+`<div class="step-card"><h2><span class="part-label">Part2</span>资料汇编1.0 — 去重合并归类</h2>
  <p class="meta">按论证方向归类。方向数和每方向的资料数自由增减。</p>`;
  for(let d=0;d<nd;d++){
    ensureList('e2_d'+d,3);
    const ni=getCount('e2_d'+d);
    h+=`<div class="section-block"><h4>论证方向 ${d+1} <button class="btn-sm danger remove-btn" onclick="removeRow('e2_dir',${d})">×方向</button></h4>
    <div class="row-inp"><label>方向名</label>${II('e2_dirname',d,'例：支持分论点1 / 范围支撑')}</div>
    <table class="t"><tr><th style="width:30px">#</th><th>资料摘要</th><th>关键句</th><th>来源</th><th>网址</th><th style="width:30px"></th></tr>`;
    for(let i=0;i<ni;i++){
      h+=`<tr><td>${i+1}</td><td>${II('e2_d'+d+'_s',i)}</td><td>${TI('e2_d'+d+'_q',i)}</td><td>${II('e2_d'+d+'_src',i)}</td><td>${II('e2_d'+d+'_url',i)}</td><td>${ni>1?`<button class="btn-sm danger" onclick="removeRow('e2_d${d}',${i})">×</button>`:''}</td></tr>`;
    }
    h+=`</table><div class="add-row-wrap"><button class="btn-add" onclick="addItem('e2_d${d}')">+1行</button></div></div>`;
  }
  h+=`<div class="add-row-wrap"><button class="btn-add gold" onclick="addItem('e2_dir')">+1个方向</button></div>`;
  return h+`</div>`;
}

// ---- E3: Part3 论点穷举 ----
function rE3() {
  ensureList('e3_args',20);
  const n=getCount('e3_args');
  let h=progressBar()+`<div class="step-card"><h2><span class="part-label">Part3</span>论点穷举清单</h2>
  <p class="meta">不筛选不评判——把能想到的所有论证方向全列出来（"因为…所以…"格式）。</p>
  <table class="t"><tr><th style="width:30px">#</th><th style="width:40%">因为</th><th style="width:40%">所以</th><th style="width:60px">方向</th><th style="width:30px"></th></tr>`;
  for(let i=0;i<n;i++){
    h+=`<tr><td>${i+1}</td><td>${II('e3_because',i)}</td><td>${II('e3_so',i)}</td><td>${(()=>{const v=gi('e3_side',i,'我方');return `<select data-k="e3_side_${i}" onchange="si('e3_side','${i}',this.value)"><option ${v==='我方'?'selected':''}>我方</option><option ${v==='对方'?'selected':''}>对方</option></select>`})()}</td><td>${n>1?`<button class="btn-sm danger" onclick="removeRow('e3_args',${i})">×</button>`:''}</td></tr>`;
  }
  return h+`</table><div class="add-row-wrap"><button class="btn-add gold" onclick="addItem('e3_args')">+1行</button></div></div>`;
}

// ---- E4: Part4 论证架构 ----

var isApp = typeof Capacitor !== 'undefined';
// ---- EXPORT ----
async function doExport(fmt) {
  save();
  var content='', ext='', mime='';
  if (fmt==='md') { content=genMD(); ext='md'; mime='text/markdown'; }
  else if (fmt==='html') { content=genHTMLTable(); ext='html'; mime='text/html'; }
  else if (fmt==='xlsx') { if(isApp||typeof XLSX==='undefined'){content=buildCSV();ext='csv';mime='text/csv';}else{genXLSX();return;} }
  else { content=genTXT(); ext='txt'; mime='text/plain'; }
  var name='辩论筑基-标准化辩案-'+new Date().toISOString().slice(0,10)+'.'+ext;
  var blob=new Blob(['﻿'+content],{type:mime+';charset=utf-8'});
  if(typeof Capacitor!=='undefined'&&Capacitor.Plugins&&Capacitor.Plugins.Filesystem){
    try{var C=Capacitor,FS=C.Plugins.Filesystem;
      var result=await FS.writeFile({path:'Debate-Coach/'+name,data:ext==='csv'?'﻿'+content:content,directory:'CACHE',recursive:true,encoding:'utf8'});
      try{var Share=C.Plugins.Share;if(Share&&Share.share)Share.share({title:'导出辩案',url:result.uri});}catch(e2){}
      alert('已导出：'+name);return;
    }catch(e){alert('导出失败：'+e.message);return;}
  }
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name;a.click();URL.revokeObjectURL(a.href);
}

function rc(key) {
  var n=parseInt(g(key+'_count'))||0;
  if (n>0) return n;
  while (gi(key+'_atk',n)||gi(key+'_res',n)||gi(key+'_arg',n)||gi(key+'_s',n)) n++;
  return n;
}
function rcField(key, field) {
  var n=parseInt(g(key+'_count'))||0;
  if (n>0) return n;
  while (D[key+'_'+field+'_'+n] !== undefined) n++;
  return n;
}

function genMD() {
  var o='# 标准化辩案\n\n日期：'+new Date().toLocaleDateString()+'\n\n';
  var P=buildParts();
  P.forEach(function(p){
    o+='## '+p.title+'\n\n';
    var rows=p.rows;
    for(var r=0;r<rows.length;r++){
      o+='| '+rows[r].map(function(c){return String(c||'').replace(/\|/g,'\\|');}).join(' | ')+' |\n';
      if(r===0){o+='|'+rows[r].map(function(){return '------';}).join('|')+'|\n';}
    }
    o+='\n';
  });
  o+='\n---\n*辩案导出完成*\n';
  return o;
}

// ---- XLSX ----
function genXLSX() {
  if (typeof XLSX==='undefined') { var o2=genHTMLTable();var blob2=new Blob([o2],{type:'application/vnd.ms-excel'});var name2='辩论筑基-标准化辩案-'+new Date().toISOString().slice(0,10)+'.xls';var a2=document.createElement('a');a2.href=URL.createObjectURL(blob2);a2.download=name2;a2.click();URL.revokeObjectURL(a2.href);return; }
  var wb=XLSX.utils.book_new();
  var cols=function(hdr){ return hdr.map(function(h){ return {wch:Math.max(h.length+4,12)}; }); };
  var P=buildParts();
  P.forEach(function(p){
    var ws=XLSX.utils.aoa_to_sheet(p.rows);
    if(p.rows.length>1) ws['!cols']=cols(p.rows[0]);
    XLSX.utils.book_append_sheet(wb,ws,p.title);
  });
  XLSX.writeFile(wb,'辩论筑基-标准化辩案-'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function buildCSV(){
  function esc(v){v=String(v||"");return (v.indexOf(",")>=0||v.indexOf("\"")>=0||v.indexOf("\n")>=0)?"\""+v.replace(/"/g,"\"\"")+"\"":v;}
  var o="",P=buildParts();
  P.forEach(function(p){
    o+=p.title+"\n";
    for(var r=0;r<p.rows.length;r++){o+=p.rows[r].map(esc).join(",")+"\n";}
    o+="\n";
  });
  return o;
}
// ---- NAV ----
function render() {
  const step=STEPS[current];
  document.getElementById('step-label').textContent=step.id+' · '+step.title;
  document.getElementById('page-num').textContent=(current+1)+'/'+STEPS.length;
  document.getElementById('btn-prev').style.display=current===0?'none':'inline-block';
  document.getElementById('btn-next').textContent=current===STEPS.length-1?'✓ 完成':'下一步 →';
  const rs={E0:rE0,E1:rE1,E2:rE2,E3:rE3,E4:rE4,E5:rE5,E6:rE6,E7:rE7,E8:rE8,E9:rE9};
  document.getElementById('content').innerHTML=(rs[step.id]||rE0)();
}
function nextStep(){save();if(current<STEPS.length-1){current++;render();}}
function prevStep(){save();if(current>0){current--;render();}}
render();
