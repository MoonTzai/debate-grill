<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>辩论赛计时器</title>
<style>
:root{--bg:#0d0d0d;--card:#141414;--border:#222;--input-bg:#1a1a1a;--gold:#ffc000;--text:#eee;--gray:#999;--dark-gray:#555;--blue:#4fa8ee;--green:#6ecd71;--red:#ee5555;--radius:8px;--radius-sm:6px}
body.light{--bg:#f5f5f5;--card:#fff;--border:#e0e0e0;--input-bg:#f0f0f0;--gold:#4f6bed;--text:#222;--gray:#666;--dark-gray:#999;--blue:#4f6bed;--green:#4caf50;--red:#e53935}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Microsoft YaHei','PingFang SC',sans-serif;height:100vh;display:flex;flex-direction:column}
header{background:var(--card);padding:14px 24px 14px 80px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative}
header h1{font-size:max(16px,1.5vw);color:var(--gold);position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
main{flex:1;overflow-y:auto;padding:8px 8px;max-width:100%;margin:0 auto;width:100%}
main .round-name-center{margin-bottom:8px}
.step-bar{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 0 8px 0;flex-wrap:wrap;font-size:13px}
.step-bar .dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0}
.step-bar .dot.done{background:var(--green)}.step-bar .dot.current{background:var(--gold)}
.step-bar .sep{color:var(--dark-gray);font-size:11px}.step-bar .label{color:var(--gray);font-size:12px}
.step-bar .label.current{color:var(--gold);font-weight:bold}.step-bar .label.done{color:var(--green)}
.round-name-center{text-align:center;font-size:18px;color:var(--gold);font-weight:bold;margin-bottom:20px}
.btn{background:var(--card);color:var(--gray);border:1px solid var(--border);padding:10px 20px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.gold{background:var(--gold);color:#000;border:none;font-weight:bold}.btn.gold:hover{opacity:.85}
body.light .btn.gold{color:#fff}
.btn.accent{background:var(--gold);color:#000;border:none;font-weight:bold}.btn.accent:hover{opacity:.85}
body.light .btn.accent{color:#fff}
.btn-sm{background:var(--card);border:1px solid var(--border);color:var(--gray);padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-family:inherit}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm.danger{color:var(--red);border-color:var(--red)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h3{color:var(--gold);font-size:15px;margin:0 0 8px 0;border-bottom:1px solid var(--border);padding-bottom:6px}
.row-inp{display:flex;gap:10px;align-items:flex-start;margin:8px 0}
.row-inp label{color:var(--gray);font-size:12px;min-width:70px;padding-top:9px;flex-shrink:0}
.row-inp input,.row-inp select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none}
.row-inp input:focus,.row-inp select:focus{border-color:var(--gold)}
select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none}
.timer-main{text-align:center;padding:8px 4px;background:var(--bg);border-radius:var(--radius);margin-bottom:4px;display:flex;flex-direction:column;justify-content:center;height:22vw}
.timer-main .big-time{font-size:18vw;font-weight:bold;color:var(--gold);font-family:'Consolas',monospace;line-height:1}
.timer-main .big-time.warn{color:var(--red)}.timer-main .big-time.paused{opacity:.5}
.timer-main .sub-label{font-size:max(16px,1.5vw);color:var(--gray);margin-top:4px}
.timer-dual{display:flex;gap:0;justify-content:center;align-items:stretch;padding:0;height:100%}
.timer-dual>div{flex:1;text-align:center;padding:0;border-radius:var(--radius);cursor:pointer;border:2px solid transparent;display:flex;flex-direction:column;justify-content:center;align-items:center}
.timer-dual>div.active{background:var(--input-bg);border-color:var(--gold)}
.timer-dual .time{font-size:11vw;font-weight:bold;color:var(--gold);font-family:'Consolas',monospace;line-height:1;white-space:nowrap}
.timer-dual .vs-sep{font-size:max(24px,1.6vw);font-weight:bold;color:var(--gold);align-self:center;flex-shrink:0;padding:0 0}
.timer-dual .time.warn{color:var(--red)}
.timer-ctrl{display:flex;gap:8px;justify-content:center;margin-top:2px;flex-wrap:wrap;padding:0 4%}
.pool-info{display:flex;gap:20px;justify-content:center;font-size:max(14px,1.2vw);color:var(--gray);margin-top:2px;padding:0 4%}
#footer-bar{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;justify-content:center;background:var(--card);align-items:center;position:relative;gap:8px;flex-wrap:wrap}
#theme-toggle{background:transparent;border:1px solid var(--border);color:var(--gray);padding:10px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
#theme-toggle:hover{border-color:var(--gold);color:var(--gold)}
.hidden{display:none!important}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.text-sm{font-size:12px}.text-gray{color:var(--gray)}
@media(max-width:600px){
  header{padding:10px 14px}header .btn-sm{position:static;font-size:11px;padding:6px 8px}#theme-toggle{font-size:11px;padding:6px 8px}header h1{font-size:13px;position:static;transform:none;width:100%;text-align:center}
  main{padding:12px}.card{padding:14px}
  .timer-main{height:auto;min-height:140px}.timer-main .big-time{font-size:56px}.timer-dual{height:auto;min-height:120px}.timer-dual .time{font-size:52px}.timer-dual .vs-sep{font-size:18px}
  .row-inp{flex-direction:column;gap:4px}.row-inp label{padding-top:0}
  .row-inp input[type=number]{width:auto!important;min-width:50px}
  .round-config{flex-direction:column;align-items:stretch;gap:6px}
  .round-config input{width:auto!important;min-width:40px}
}
</style>
</head>
<body class="light">
<header>
  <button onclick="window.top.location.reload()" class="btn-sm" style="position:absolute;left:20px">主页</button>
  <h1 id="header-title">辩论赛计时器</h1>
  <span><button id="theme-toggle" onclick="toggleTheme()">界面颜色</button><button class="btn-sm" id="fullscreen-btn" onclick="if(document.fullscreenElement){document.exitFullscreen()}else{document.documentElement.requestFullscreen()}" title="全屏快捷键F11">全屏/快捷键F11</button></span>
</header>
<main id="main"></main>
<div id="footer-bar"><span id="footer-btns" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center"></span></div>

function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}timerRunning=false;timerPaused=false;}
function fmtTime(s){var m=Math.floor(Math.max(0,s)/60),sec=Math.max(0,s)%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
var muted=false;
var testTone=0;
function testSoundBtn(btn){
  var wasMuted=muted;muted=false;
  if(testTone===0){playBeep('warn');testTone=1;btn.textContent='🔔 0s试音';}
  else{playBeep('end');testTone=0;btn.textContent='🔔 30s试音';}
  muted=wasMuted;
}

function playBeep(type){if(muted)return;
  if(type==='end'){
    try{if(!_dingAudio)_dingAudio=new Audio('data:audio/mpeg;base64,'+DING_B64);_dingAudio.currentTime=0;_dingAudio.play();}catch(e){}
  }else{
    try{var C=window.AudioContext||window.webkitAudioContext;var ctx=new C();
      function pip(freq,delay){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=freq;g.gain.value=.25;o.type='square';
        o.start();setTimeout(function(){o.stop();},80);
      }
      if(type==='warn'){pip(800,0);}
      else{pip(800,0);setTimeout(function(){pip(800,150);},150);setTimeout(function(){pip(800,300);},300);setTimeout(function(){pip(1200,450);},450);}
    }catch(e){}
  }
  if(typeof Capacitor!=='undefined'&&Capacitor.Plugins&&Capacitor.Plugins.LocalNotifications){
    try{Capacitor.Plugins.LocalNotifications.schedule({notifications:[{id:Date.now(),title:'计时器',body:type==='warn'?'30秒警告':'时间到！',schedule:{at:new Date(Date.now()+100)}}]});}catch(e2){}
  }
}
function toggleTheme(){document.body.classList.toggle('light');}

// Views
function onModeChange(idx,val){
  FORMAT.rounds[idx].mode=val;
  if(val==='2')FORMAT.rounds[idx].speaker='双方';
  goFormatEdit();
}
function onSpeakerChange(idx,val){FORMAT.rounds[idx].speaker=val;goFormatEdit();}
function togglePool(val){
  FORMAT.timePool.enabled=val==='1';
  FORMAT.rounds.forEach(function(r){r.fromPool=FORMAT.timePool.enabled;});
  goFormatEdit();
}
function addRound(){
  FORMAT.rounds.push({name:'环节',mode:'1',speaker:'正方',duration:180,durSec:0,proDuration:120,proSec:0,conDuration:120,conSec:0,fromPool:FORMAT.timePool.enabled});
  goFormatEdit();
}
function deleteRound(i){FORMAT.rounds.splice(i,1);goFormatEdit();}

function goStart(){stopTimer();document.getElementById('header-title').textContent='辩论赛计时器';VIEW=0;render()}
function goFormatEdit(){stopTimer();VIEW=1;render()}

  var h='<div class="start-wrap" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:24px">';
  h+='<div style="font-size:36px">⏱️</div><h2 style="color:var(--gold);font-size:22px">辩论赛计时器</h2>';
  h+='<p class="text-gray">适配单方发言 · 双方交替 · 质询盘问 · 时间池/共计时赛制</p>';
  h+='<div class="start-actions" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  h+='<button class="btn gold" onclick="newFormat()">新建赛制</button>';
  if(FORMAT)h+='<button class="btn" onclick="goMatch()">使用当前赛事/赛制开始</button>';
  h+='<button class="btn-sm" onclick="document.getElementById(\'load-fmt\').click()">加载赛制文件</button>';
  h+='</div><input type="file" id="load-fmt" accept=".json" class="hidden" onchange="loadFormatFile(this)">';
  if(FORMAT)h+='<p class="text-sm text-gray mt-8">当前赛事/赛制：'+FORMAT.name+'（'+FORMAT.rounds.length+'个环节'+(FORMAT.timePool.enabled?'，时间池/共计时赛制':'')+'）</p>';
  h+='<div style="margin-top:24px"><button class="btn-sm danger" onclick="clearAll()">清除全部缓存</button></div>';
  h+=renderFormatList()+'</div>';m.innerHTML=h;
}
async function exportFormat(){
  if(!FORMAT||!FORMAT.name){alert('请先输入赛制名称');return;}
  var out=JSON.parse(JSON.stringify(FORMAT));delete out._updated;
  var content=JSON.stringify(out,null,2);
  var fname=(FORMAT.name||'赛制')+'.json';
  var blob=new Blob(['﻿'+content],{type:'application/json;charset=utf-8'});
  if(typeof Capacitor!=='undefined'&&Capacitor.Plugins&&Capacitor.Plugins.Filesystem){
    try{var C=Capacitor,FS=C.Plugins.Filesystem;
      var result=await FS.writeFile({path:'Debate-Coach/'+fname,data:content,directory:'CACHE',recursive:true,encoding:'utf8'});
      try{var Share=C.Plugins.Share;if(Share&&Share.share)Share.share({title:'导出赛制',url:result.uri});}catch(e2){}
      alert('已导出：'+fname);return;
    }catch(e){alert('导出失败：'+e.message);return;}
  }
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();URL.revokeObjectURL(a.href);
}
function clearAll(){if(!confirm('确定清除全部缓存数据？此操作不可撤销。'))return;if(!confirm('再次确认：清除所有赛制和比赛数据？'))return;localStorage.removeItem('debate_fmt_current');try{var list=JSON.parse(localStorage.getItem(FORMATS_KEY)||'[]');list.forEach(function(item){localStorage.removeItem('debate_fmt_'+item.key)});localStorage.removeItem(FORMATS_KEY)}catch(e){}FORMAT=null;MATCH=null;goStart();}
function newFormat(){FORMAT={name:'',proTeam:'',conTeam:'',timePool:{enabled:false,pro:0,con:0},rounds:[]};MATCH=null;goFormatEdit();}
function loadFormatFile(input){if(!input.files||!input.files[0])return;var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.rounds){FORMAT=d;MATCH=null;saveCurrentFormat();goStart();}}catch(ex){alert('无效文件');}};r.readAsText(input.files[0]);input.value='';}

function renderFormatList(){
  try{var list=JSON.parse(localStorage.getItem(FORMATS_KEY)||'[]');if(!list.length)return'';
    var h='<div class="card" style="max-width:500px;text-align:left;margin-top:20px"><h3>已保存赛制</h3>';
    list.forEach(function(item){h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><span style="cursor:pointer" onclick="loadSavedFormat(\''+item.key+'\')">'+item.name+'（'+item.count+'环节'+(item.pool?'，时间池':'')+'）</span><button class="btn-sm danger" onclick="deleteSavedFormat(\''+item.key+'\')">删除</button></div>';});
    h+='</div>';return h;
  }catch(e){return'';}
}
function loadSavedFormat(key){try{var s=localStorage.getItem('debate_fmt_'+key);if(s){FORMAT=JSON.parse(s);MATCH=null;saveCurrentFormat();goStart();}}catch(e){}}
function deleteSavedFormat(key){if(!confirm('删除此赛制？'))return;localStorage.removeItem('debate_fmt_'+key);try{var list=JSON.parse(localStorage.getItem(FORMATS_KEY)||'[]');list=list.filter(function(x){return x.key!==key});localStorage.setItem(FORMATS_KEY,JSON.stringify(list));}catch(e){}render();}
function flushFormatInputs(){
  // Force all number inputs to write their values to FORMAT before save/render
  if(!FORMAT)return;
  var allInputs=document.querySelectorAll('input[type=number]');
  for(var i=0;i<allInputs.length;i++){allInputs[i].dispatchEvent(new Event('input',{bubbles:true}));}
  if(document.activeElement&&document.activeElement.tagName==='INPUT')document.activeElement.blur();
}
function saveCurrentFormat(){if(!FORMAT||!FORMAT.name)return;flushFormatInputs();localStorage.setItem('debate_fmt_current',JSON.stringify(FORMAT));try{var list=JSON.parse(localStorage.getItem(FORMATS_KEY)||'[]');var key='fmt_'+Date.now();localStorage.setItem('debate_fmt_'+key,JSON.stringify(FORMAT));var existing=list.findIndex(function(x){return x.name===FORMAT.name});var entry={key:key,name:FORMAT.name,count:FORMAT.rounds.length,pool:FORMAT.timePool.enabled};if(existing>=0)list[existing]=entry;else list.push(entry);if(list.length>30)list=list.slice(-30);localStorage.setItem(FORMATS_KEY,JSON.stringify(list));}catch(e){}}

// Format Editor
function renderFormatEdit(m,f){
  if(!FORMAT)FORMAT={name:'',proTeam:'',conTeam:'',timePool:{enabled:false,pro:0,con:0},rounds:[]};
  var h='<div class="card"><h3>自定义赛制</h3>';
  h+='<div class="row-inp"><label>顶部标题</label><input value="'+esc(FORMAT.name||'')+'" oninput="FORMAT.name=this.value" placeholder="赛事/辩题/双方队伍等拟作为标题的名字"></div>';
  // Time pool
  h+='<div class="row-inp"><label>时间池/共计时赛制</label><select onchange="togglePool(this.value)"><option value="0" '+(FORMAT.timePool.enabled?'':'selected')+'>不启用</option><option value="1" '+(FORMAT.timePool.enabled?'selected':'')+'>启用</option></select>';
  if(FORMAT.timePool.enabled){
    h+='<span style="font-size:12px;color:var(--gray)">正方池</span><input type=number value="'+Math.floor(FORMAT.timePool.pro/60)+'" oninput="FORMAT.timePool.pro=this.value*60+(FORMAT.timePool.pro%60)" style="width:40px" min=0>分<input type=number value="'+(FORMAT.timePool.pro%60)+'" oninput="FORMAT.timePool.pro=Math.floor(FORMAT.timePool.pro/60)*60+(+this.value)" style="width:40px" min=0 max=59>秒';
    h+='<span style="font-size:12px;color:var(--gray);margin-left:8px">反方池</span><input type=number value="'+Math.floor(FORMAT.timePool.con/60)+'" oninput="FORMAT.timePool.con=this.value*60+(FORMAT.timePool.con%60)" style="width:40px" min=0>分<input type=number value="'+(FORMAT.timePool.con%60)+'" oninput="FORMAT.timePool.con=Math.floor(FORMAT.timePool.con/60)*60+(+this.value)" style="width:40px" min=0 max=59>秒';
    h+='<button class="btn-sm" onclick="flushFormatInputs();goFormatEdit()" title="应用池设置">设置</button>';
    h+='<p class="text-sm text-gray mt-8">启用后，每个环节可勾选"从池扣除"。比赛时池剩余时间实时显示，池耗尽将无法进行后续环节。</p>';
  }
  h+='</div>';
  h+='<div class="row-inp"><label>正方</label><input value="'+esc(FORMAT.proTeam||'')+'" oninput="FORMAT.proTeam=this.value" placeholder="可以填队伍名/持方，注意别太长"></div>';
  h+='<div class="row-inp"><label>反方</label><input value="'+esc(FORMAT.conTeam||'')+'" oninput="FORMAT.conTeam=this.value" placeholder="可以填队伍名/持方，注意别太长"></div>';
  h+='</div></div>';
  // Rounds
  if(FORMAT.rounds.length===0)h+='<p class="text-gray text-sm" style="text-align:center;padding:20px">尚未添加环节，点击下方按钮开始构建赛制</p>';
  FORMAT.rounds.forEach(function(r,i){
    h+='<div class="card" style="padding:12px"><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    h+='<b>'+(i+1)+'.</b> <input value="'+esc(r.name)+'" oninput="FORMAT.rounds['+i+'].name=this.value" style="width:90px" placeholder="环节名">';
    h+='<select onchange="onModeChange('+i+',this.value)">'+MODES.map(function(x){return'<option value="'+x.v+'" '+(r.mode===x.v?'selected':'')+'>'+x.t+'</option>';}).join('')+'</select>';
    h+='<select onchange="onSpeakerChange('+i+',this.value)"><option '+(r.speaker==='正方'?'selected':'')+'>正方</option><option '+(r.speaker==='反方'?'selected':'')+'>反方</option><option '+(r.speaker==='双方'?'selected':'')+'>双方</option></select>';
    if(FORMAT.timePool.enabled){h+='<label style="font-size:12px"><input type=checkbox '+(r.fromPool?'checked':'')+' oninput="FORMAT.rounds['+i+'].fromPool=this.checked;goFormatEdit()">从池扣除</label>';}
    if(!r.fromPool||!FORMAT.timePool.enabled){
      if(r.mode==='2'){h+='正<input type=number value="'+Math.floor((r.proDuration||120)/60)+'" oninput="FORMAT.rounds['+i+'].proDuration=this.value*60+FORMAT.rounds['+i+'].proSec" style="width:40px" min=0>分<input type=number value="'+(r.proSec||0)+'" oninput="FORMAT.rounds['+i+'].proSec=+this.value" style="width:40px" min=0 max=59>秒 反<input type=number value="'+Math.floor((r.conDuration||120)/60)+'" oninput="FORMAT.rounds['+i+'].conDuration=this.value*60+FORMAT.rounds['+i+'].conSec" style="width:40px" min=0>分<input type=number value="'+(r.conSec||0)+'" oninput="FORMAT.rounds['+i+'].conSec=+this.value" style="width:40px" min=0 max=59>秒';}
      else{h+='<input type=number value="'+Math.floor((r.duration||180)/60)+'" oninput="FORMAT.rounds['+i+'].duration=this.value*60+FORMAT.rounds['+i+'].durSec" style="width:40px" min=0>分<input type=number value="'+(r.durSec||0)+'" oninput="FORMAT.rounds['+i+'].durSec=+this.value" style="width:40px" min=0 max=59>秒';}
      h+='<button class="btn-sm" onclick="flushFormatInputs();goFormatEdit()" title="应用时间设置">设置</button>';
    }
    h+='<button class="btn-sm danger" onclick="deleteRound('+i+')">×</button></div></div>';
  });
  h+='<button class="btn-sm" onclick="addRound()">+ 添加环节</button>';
  m.innerHTML=h;
  f.innerHTML='<button class="btn gold" onclick="if(!FORMAT.name){alert(\'顶部标题未设置（第一项）\');return;}MATCH=null;goMatch()">保存并开始</button><button class="btn-sm" onclick="exportFormat()">导出赛制</button><button class="btn" onclick="goStart()">返回</button>';
}

// Match runner
function renderMatch(m,f){
  stopTimer();
  document.getElementById('header-title').textContent=FORMAT.name||'辩论赛计时器';
  var r=FORMAT.rounds[roundIdx];MATCH.currentRound=roundIdx;
  if(!r.durSec)r.durSec=0;if(!r.proSec)r.proSec=0;if(!r.conSec)r.conSec=0;
  if(!r.proDuration)r.proDuration=r.duration||180;if(!r.conDuration)r.conDuration=r.duration||180;
  if(r.fromPool&&FORMAT.timePool.enabled){
    MATCH._snapPro=MATCH.proPool;MATCH._snapCon=MATCH.conPool;
    if(r.speaker==='双方'){proRemain=MATCH.proPool;conRemain=MATCH.conPool;}
    else if(r.speaker==='正方'){proRemain=MATCH.proPool;conRemain=r.mode==='2'?MATCH.conPool:0;}
    else{proRemain=MATCH.conPool;conRemain=r.mode==='2'?MATCH.proPool:0;}
  }else{
    proRemain=r.mode==='2'?(r.proDuration||120):(r.duration||180);
    conRemain=r.mode==='2'?(r.conDuration||120):0;
  }

  var h='<div class="card timer-main">';
  if(r.mode==='2'){
    h+='<div class="timer-dual"><div id="dual-pro" class="active" onclick="switchSide(\'pro\')"><div class="sub-label">'+(FORMAT.proTeam?'正方 · '+FORMAT.proTeam:'正方')+'</div><div class="time" id="t-pro">'+fmtTime(proRemain)+'</div></div><div class="vs-sep">VS</div><div id="dual-con" onclick="switchSide(\'con\')"><div class="sub-label">'+(FORMAT.conTeam?'反方 · '+FORMAT.conTeam:'反方')+'</div><div class="time" id="t-con">'+fmtTime(conRemain)+'</div></div></div>';
  }else{
    h+='<div><div class="sub-label">'+(r.speaker==='正方'?(FORMAT.proTeam?'正方 · '+FORMAT.proTeam:'正方'):r.speaker==='反方'?(FORMAT.conTeam?'反方 · '+FORMAT.conTeam:'反方'):r.speaker)+' · '+r.name+'</div><div class="big-time" id="t-main">'+fmtTime(proRemain)+'</div></div>';
  }
  if(FORMAT.timePool.enabled){h+='<div class="pool-info"><span id="pool-pro">正方池剩余：'+fmtTime(MATCH.proPool)+'</span><span id="pool-con">反方池剩余：'+fmtTime(MATCH.conPool)+'</span></div>';}
  h+='</div>'; // close timer-main
  // Controls outside timer card
  if(r.mode==='2'){
    h+='<div class="timer-ctrl"><button class="btn-sm" onclick="testSoundBtn(this)">🔔 30s试音</button><button class="btn gold" id="btn-toggle" onclick="toggleDual()">开始计时</button><button class="btn-sm" onclick="if(timerRunning){switchSide(activeSide===\'pro\'?\'con\':\'pro\')}" id="switch-btn">切换发言方</button><button class="btn-sm" onclick="resetRound()">重置</button><button class="btn-sm" onclick="if(confirm(\'重置所有环节计时？赛制和内容不受影响。\')){stopTimer();MATCH.proPool=FORMAT.timePool.pro;MATCH.conPool=FORMAT.timePool.con;goMatch()}">重置所有环节</button></div>';
  }else{
    h+='<div class="timer-ctrl"><button class="btn-sm" onclick="testSoundBtn(this)">🔔 30s试音</button><button class="btn gold" id="btn-toggle" onclick="toggleSingle()">开始计时</button><button class="btn-sm" onclick="resetRound()">重置</button><button class="btn-sm" onclick="if(confirm(\'重置所有环节计时？赛制和内容不受影响。\')){stopTimer();MATCH.proPool=FORMAT.timePool.pro;MATCH.conPool=FORMAT.timePool.con;goMatch()}">重置所有环节</button></div>';
  }
  m.innerHTML=h;
  if(timerPaused){var btn=document.getElementById('btn-toggle');if(btn)btn.textContent='暂停/继续';}

  // Step bar above main
  var sbEl=document.getElementById('main').previousElementSibling;
  if(!sbEl||!sbEl.classList.contains('step-bar')){sbEl=document.createElement('div');sbEl.className='step-bar';document.getElementById('main').parentNode.insertBefore(sbEl,document.getElementById('main'));}
  var sbH='<div class="step-bar">';
  FORMAT.rounds.forEach(function(rr,i){var cls=i===roundIdx?' current':'',lc=i===roundIdx?' current':'';if(i<roundIdx){cls=' done';lc=' done'}sbH+='<span class="dot'+cls+'"></span><span class="label'+lc+'">'+(i+1)+'/'+FORMAT.rounds.length+'. '+rr.name+'</span>';if(i<FORMAT.rounds.length-1)sbH+='<span class="sep">--</span>';});
  sbH+='</div>';sbEl.outerHTML=sbH;

  f.innerHTML='';
  f.innerHTML+='<button class="btn" onclick="goMatchRound('+(roundIdx-1)+')">← 上一环节</button>';
  f.innerHTML+='<button class="btn gold" onclick="goMatchRound('+(roundIdx+1)+')">下一环节 →</button>';
  f.innerHTML+='<button class="btn-sm" style="margin-left:8px" onclick="if(confirm(\'返回赛制编辑？当前比赛进度将保留。\')){stopTimer();goFormatEdit();}">编辑赛制</button>';
  f.innerHTML+='<button class="btn-sm danger" style="margin-left:8px" onclick="endMatch()">结束比赛</button>';
}
function endMatch(){
  stopTimer();
  if(!confirm('确定结束比赛？'))return;
  if(FORMAT&&FORMAT.name&&confirm('是否导出当前赛制「'+FORMAT.name+'」？')){
    exportFormat();
  }
  goStart();
}
function goMatchRound(idx){stopTimer();if(idx<0||idx>=FORMAT.rounds.length)return;roundIdx=idx;MATCH.currentRound=idx;render();}

// Timer logic
function toggleSingle(){
  if(timerRunning&&!timerPaused){timerPaused=true;stopTimer();updateToggleBtn();return;}
  timerPaused=false;runSingle();updateToggleBtn();
}
function toggleDual(){
  if(timerRunning&&!timerPaused){timerPaused=true;stopTimer();updateToggleBtn();return;}
  timerPaused=false;runDual();updateToggleBtn();
}
function updateToggleBtn(){var btn=document.getElementById('btn-toggle');var sw=document.getElementById('switch-btn');if(!btn)return;if(!timerRunning){btn.textContent='开始计时';btn.className='btn gold';if(sw){sw.className='btn-sm';}}else if(timerPaused){btn.textContent='暂停/继续';btn.className='btn gold';if(sw){sw.className='btn-sm';}}else{btn.textContent='暂停/继续';btn.className='btn';if(sw){sw.className='btn accent';}}}
function runSingle(){
  stopTimer();timerRunning=true;timerPaused=false;
  var r=FORMAT.rounds[roundIdx],fromPool=r.fromPool&&FORMAT.timePool.enabled;
  timerInterval=setInterval(function(){
    proRemain--;var el=document.getElementById('t-main');if(el){el.textContent=fmtTime(proRemain);if(proRemain<=30)el.classList.add('warn');}
    if(fromPool){if(r.speaker==='正方')MATCH.proPool--;else MATCH.conPool--;updatePoolDisplay();}
    if(proRemain===30)playBeep('warn');
    if(proRemain<=0){stopTimer();playBeep('end');setTimeout(function(){alert('时间到！');},250);updateToggleBtn();}
  },1000);
}
function runDual(){
  stopTimer();timerRunning=true;timerPaused=false;activeSide='pro';
  var r=FORMAT.rounds[roundIdx],fromPool=r.fromPool&&FORMAT.timePool.enabled;
  timerInterval=setInterval(function(){
    if(activeSide==='pro'){proRemain--;var el=document.getElementById('t-pro');if(el){el.textContent=fmtTime(proRemain);if(proRemain<=30)el.classList.add('warn');}if(fromPool)MATCH.proPool--;updatePoolDisplay();if(proRemain===30)playBeep('warn');if(proRemain<=0){playBeep('end');activeSide='con';switchSide('con');}}
    else{conRemain--;var el=document.getElementById('t-con');if(el){el.textContent=fmtTime(conRemain);if(conRemain<=30)el.classList.add('warn');}if(fromPool)MATCH.conPool--;updatePoolDisplay();if(conRemain===30)playBeep('warn');if(conRemain<=0){playBeep('end');activeSide='pro';switchSide('pro');}}
    if(proRemain<=0&&conRemain<=0){stopTimer();playBeep('end');setTimeout(function(){alert('双方时间均到！');},250);updateToggleBtn();}
  },1000);
}
function updatePoolDisplay(){
  var ep=document.getElementById('pool-pro');if(ep)ep.textContent='正方池剩余：'+fmtTime(MATCH.proPool);
  var ec=document.getElementById('pool-con');if(ec)ec.textContent='反方池剩余：'+fmtTime(MATCH.conPool);
}
function resetRound(){
  stopTimer();
  if(MATCH._snapPro!==undefined){MATCH.proPool=MATCH._snapPro;MATCH.conPool=MATCH._snapCon;}
  goMatch();
}
function switchSide(side){activeSide=side;var ep=document.getElementById('dual-pro'),ec=document.getElementById('dual-con');if(ep)ep.className=side==='pro'?'active':'';if(ec)ec.className=side==='con'?'active':'';}

(function(){try{var s=localStorage.getItem('debate_fmt_current');if(s)FORMAT=JSON.parse(s);}catch(e){}goStart();})();
if(typeof Capacitor!=='undefined'){var fb=document.getElementById('fullscreen-btn');if(fb)fb.style.display='none';}
</script>
